project:
 type: website
 render:
  - "**/*.qmd"
  - "**/*.ipynb"

execute:
 freeze: true

website:
 draft-mode: visible
 title: "iSRL"
 site-url: "https://isrl-research.github.io"
 description: "Open research lab building IFID — the data coordination layer for Indian packaged food ingredient identity."
 image: "assets/og-image.png"
 favicon: "assets/isrl-logo-square.png"
 google-analytics: "G-8PD6FFEJEV"
 open-graph:
  locale: en_US
  site-name: iSRL
 twitter-card:
  card-style: summary_large_image
  site: "@isrl_research"
 navbar:
  pinned: true
  right:
   - href: index.qmd
     text: Home
   - href: roadmap.qmd
     text: Roadmap
   - href: join-us.qmd
     text: Join us
   - href: fund.qmd
     text: Funding
   - href: pub/index.qmd
     text: Publications
   - href: https://zenodo.org/communities/isrl/records
     text: Zenodo
   - href: team/index.qmd
     text: Team
   - about.qmd
   - text: Research Logs
     href: logs/index.qmd
   - icon: github
     href: https://github.com/isrl-research
     aria-label: GitHub


format:
 html:
  theme:
   - litera
   - brand
   - custom.scss
  css: styles.css
  toc: true
  fontsize: 17px
  backgroundcolor: '#f7f6f2'
  include-in-header: _includes/_base-jsonld.html
  filters:
    - highlight-span.lua
    - jsonld.lua
  reference-location: margin